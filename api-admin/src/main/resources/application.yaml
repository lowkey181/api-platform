server:
  port: 9002
  tomcat:
    uri-encoding: UTF-8
spring:
  application:
    name: api-admin
    # 数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/api_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
    hikari:
      maximum-pool-size: 40
      minimum-idle: 10
      connection-timeout: 30000
      idle-timeout: 600000
      max-lifetime: 1800000
      validation-timeout: 5000
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    # 连接超时时间（毫秒）
    connection-timeout: 60000
    # 心跳间隔（秒），防止连接超时断开
    requested-heartbeat: 30
    # 自动恢复连接
    listener:
      simple:
        concurrency: 4
        max-concurrency: 12
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
        acknowledge-mode: auto
        prefetch: 20
        default-requeue-rejected: false
    # 定义队列名称（常量）
    exchange:
      log: api.call.log.exchange
      log-dlx: api.call.log.dlx
    queue:
      log: api.call.log.v2.queue
      log-dlq: api.call.log.dlq
    routing:
      log: api.call.log
      log-dlq: api.call.log.dlq
# 文件上传配置
  servlet:
    multipart:
      max-file-size: 500MB
      max-request-size: 500MB


alipay:
  appId: 9021000162606238
  merchantPrivateKey: 
  alipayPublicKey: 
  notifyUrl: http://w9327cc6.natappfree.cc/alipay/notify
  returnUrl: http://localhost:3000/user/api-market
  signType: RSA2
  charset: utf-8
  #支付宝网关地址
  gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do




# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

# 自定义配置
app:
  chunk:
    session-expire-hours: 6
  mq:
    failed-log-key: mq:failed:api-call-log
    failed-log-max-size: 10000
  redis:
    cleanup-on-shutdown: true
    cleanup-patterns:
      - "login:user:*"
      - "chunk:upload:*"
      - "mq:failed:api-call-log"
  # 文件存储配置
  storage:
    # 存储类型：minio, oss
    type: minio
    # MinIO 配置
    minio:
      endpoint: http://127.0.0.1:9005
      access-key: root
      secret-key: 12345678
      bucket: api-platform
    # 阿里云 OSS 配置
    oss:
      endpoint: oss-cn-hangzhou.aliyuncs.com
      access-key: your-access-key
      secret-key: your-secret-key
      bucket: your-bucket-name
      domain: https://your-domain.com