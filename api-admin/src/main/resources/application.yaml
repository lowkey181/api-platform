server:
  port: 9002
  tomcat:
    uri-encoding: UTF-8
spring:
  application:
    name: api-admin
    # 数据库
  datasource:
    driver-class-name: com.mysql.cj.jdbc.Driver
    url: jdbc:mysql://localhost:3306/api_platform?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
    username: root
    password: 123456
  rabbitmq:
    host: localhost
    port: 5672
    username: guest
    password: guest
    # 连接超时时间（毫秒）
    connection-timeout: 60000
    # 心跳间隔（秒），防止连接超时断开
    requested-heartbeat: 30
    # 自动恢复连接
    listener:
      simple:
        retry:
          enabled: true
          initial-interval: 1000
          max-attempts: 3
          max-interval: 10000
        acknowledge-mode: auto
        prefetch: 1
    # 定义队列名称（常量）
    queue:
      log: api.call.log.queue

alipay:
  appId: 9021000162606238
  merchantPrivateKey: 
  alipayPublicKey: 
  notifyUrl: http://qb663d86.natappfree.cc/alipay/notify
  returnUrl: http://localhost:3000/user/api-market
  signType: RSA2
  charset: utf-8
  # 我的支付宝网关地址
  gatewayUrl: https://openapi-sandbox.dl.alipaydev.com/gateway.do




# MyBatis-Plus
mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  mapper-locations: classpath:mapper/*.xml

# 自定义配置
app:
  redis:
    cleanup-on-shutdown: true
    cleanup-patterns:
      - "login:user:*"